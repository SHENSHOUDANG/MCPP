grid_path = "data/ports/los_angeles_training_v1/los_angeles_training_v1_grid.json"
tasks_path = "data/ports/los_angeles_training_v1/los_angeles_training_v1_tasks.json"
output_dir = "data/ports/los_angeles_training_v1"
map_source = "port_of_los_angeles_task_mapping_v2_0_chart_aligned_2026_06_30"
platform_profiles_path = "configs/platform_profiles_la_training_v1.toml"
uav_count = 3
usv_count = 3

platform_profile_sequence = [
  "UAV_LA_TRAINING",
  "UAV_LA_TRAINING",
  "UAV_LA_TRAINING",
  "USV_LA_TRAINING",
  "USV_LA_TRAINING",
  "USV_LA_TRAINING",
]

[contract]
model_contract_version = "V1.2"
scenario_status = "PENDING"
historical_only = false
final_experiment_eligible = false
notice = "Los Angeles training scenario uses the user-provided Port of Los Angeles Task Mapping V2.0 chart-aligned package. Geometry is validated against public NOAA/POLA sources but is not native ENC vector geometry; training parameters remain non-final until GIS and algorithm review are frozen."

[scheduling]
task_lifecycle = "v1_2_direct_service"
risk_weight = 12.0
urgency_weight = 6.0
distance_weight = 0.06
load_weight = 0.25
compatibility_bonus = 4.0

[scheduler_rl]
max_steps = 160
candidate_k = 10
device = "auto"
num_envs = 1
env_workers = 1
cpu_threads = 4
interop_threads = 1
gpu_memory_fraction = 0.25
process_priority = "below_normal"
learning_rate = 0.0003
gamma = 0.98
gae_lambda = 0.95
clip_ratio = 0.2
update_epochs = 2
rollout_steps = 16
hidden_dim = 96

[scheduler_rl.reward]
team_close_reward = 8.0
service_progress_reward = 1.0
energy_cost = 0.5
time_cost = 0.01
invalid_penalty = 5.0
conflict_penalty = 1.0
