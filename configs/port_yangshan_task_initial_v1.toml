grid_path = "data/ports/yangshan_task_initial_v1/yangshan_task_initial_v1_grid.json"
tasks_path = "data/ports/yangshan_task_initial_v1/yangshan_task_initial_v1_tasks.json"
output_dir = "data/ports/yangshan_task_initial_v1"
map_source = "yangshan_task_initial_qgis_gpkg"
platform_profiles_path = "configs/platform_profiles_cn_common.toml"
uav_count = 4
usv_count = 4

platform_profile_sequence = [
  "UAV_M_M30",
  "UAV_M_M30",
  "UAV_M_M30",
  "UAV_M_M30",
  "USV_S_SURVEY",
  "USV_S_SURVEY",
  "USV_S_SURVEY",
  "USV_S_SURVEY",
]

[contract]
model_contract_version = "pre_v1_2_coupled_screen_review"
scenario_status = "HISTORICAL"
historical_only = true
final_experiment_eligible = false
notice = "Yangshan fixed-point screening/review data are retained only as a historical engineering baseline under V1.2."

[platform_depots]
uav = [82, 108]
usv = [82, 108]

[scheduling]
task_lifecycle = "legacy_screen_review"
risk_weight = 14.0
distance_weight = 0.07
load_weight = 0.28
compatibility_bonus = 5.0

[scheduler_rl]
max_steps = 240
candidate_k = 12
device = "auto"
num_envs = 2
env_workers = 2
cpu_threads = 6
interop_threads = 2
gpu_memory_fraction = 0.35
process_priority = "below_normal"
learning_rate = 0.0003
gamma = 0.98
gae_lambda = 0.95
clip_ratio = 0.2
update_epochs = 4
rollout_steps = 32
hidden_dim = 128

[scheduler_rl.reward]
team_close_reward = 8.0
screen_progress_reward = 1.0
review_progress_reward = 1.5
energy_cost = 0.5
time_cost = 0.01
invalid_penalty = 5.0
conflict_penalty = 1.0

[review_trigger]
confidence_threshold = 0.65
mandatory_review_risk = 3
base_review_deadline = 180.0
risk_deadline_scale = 15.0
confidence_deadline_scale = 10.0
replenish_steps = 6
sensitivity = 0.85
specificity = 0.80
confidence_noise = 0.08
uncertainty_base = 0.35

[review_trigger.anomaly_probability_by_risk]
1 = 0.10
2 = 0.25
3 = 0.45
