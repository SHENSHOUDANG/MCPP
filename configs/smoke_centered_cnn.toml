[env]
width = 8
height = 8
max_steps = 40
seed = 20260428
start = [0, 0]
num_agents = 2
start_positions = [[0, 0], [0, 7]]
random_corner_start = false
obstacles = []
obstacle_ratio = 0.05
random_obstacle_seed = 20260428
danger_radius = 0
observation_radius = 2
recent_path_length = 8
communication_radius = 4
use_legacy_truth_coverage_observation = false
use_explicit_map_memory = true
share_map_memory = true
observation_mode = "centered_compressed_memory"
centered_map_size = 7
compressed_border = true
intent_grid_size = 3

[reward]
finish_reward = 10.0
normalize_team_finish_reward = true
team_new_cell_weight = 1.0
team_straight_weight = 0.01
team_repeat_weight = 0.3
team_invalid_weight = 1.0
team_time_weight = 0.05
scale_time_cost_by_uncovered = false

[ppo]
total_timesteps = 64
rollout_steps = 16
update_epochs = 1
mini_batch_size = 16
gamma = 0.98
gae_lambda = 0.95
clip_ratio = 0.2
learning_rate = 0.0003
value_coef = 0.5
entropy_coef = 0.002
max_grad_norm = 0.5
hidden_dim = 32
seed = 20260428
device = "cpu"
actor_encoder = "cnn"
use_graph_attention = true
gat_num_heads = 4
gat_use_edge_features = true
gat_residual = true
gat_attention_dropout = 0.0
use_coverage_messages = true
use_action_mask = true

[train]
run_root = "runs\\smoke_centered_cnn"
log_interval = 1
eval_interval = 1
checkpoint_interval = 1
