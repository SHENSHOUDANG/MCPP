[env]
width = 6
height = 6
max_steps = 48
seed = 7
start = [0, 0]
obstacles = [[2, 2], [3, 2], [4, 4]]
random_obstacle_count = 0
random_obstacle_seed = 11
danger_radius = 1

[reward]
finish_reward = 10.0
normalize_team_finish_reward = true
team_new_cell_weight = 1.0
team_straight_weight = 0.01
team_repeat_weight = 0.3
team_invalid_weight = 1.0
team_time_weight = 0.02
scale_time_cost_by_uncovered = false

[ppo]
total_timesteps = 256
rollout_steps = 64
update_epochs = 2
mini_batch_size = 32
gamma = 0.98
gae_lambda = 0.95
clip_ratio = 0.2
learning_rate = 0.0003
value_coef = 0.5
entropy_coef = 0.01
max_grad_norm = 0.5
hidden_dim = 64
seed = 7
device = "auto"
use_action_mask = true

[train]
run_root = "runs"
log_interval = 1
