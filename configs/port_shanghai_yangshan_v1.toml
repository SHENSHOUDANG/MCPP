grid_path = "data/ports/shanghai_yangshan_osm_v1/shanghai_yangshan_osm_v1_grid.json"
tasks_path = "data/ports/shanghai_yangshan_osm_v1/shanghai_yangshan_osm_v1_tasks.json"
output_dir = "outputs/port_inspection/shanghai_yangshan_osm_v1"
map_source = "openstreetmap_overpass"
platform_profiles_path = "configs/platform_profiles_cn_common.toml"
uav_count = 4
usv_count = 4
depot = [53, 9]

platform_profile_sequence = [
  "UAV_H_M350",
  "UAV_H_M350",
  "UAV_M_M30",
  "UAV_M_M30",
  "USV_P_M75",
  "USV_P_M75",
  "USV_S_SURVEY",
  "USV_S_SURVEY",
]

[platform.uav]
model_hint = "DJI Matrice 350 RTK class industrial multirotor, common China port-inspection UAV class"
speed_mps = 15.0
max_speed_mps_reference = 23.0
endurance_minutes = 45.0
max_endurance_minutes_reference = 55.0
payload_kg = 2.0
coverage_width_cells = 3
energy_rate_per_cell = 1.2
allowed_task_types = ["point"]
preferred_task_types = ["point"]
sensor_payloads = ["visible_zoom_camera", "thermal_camera", "loudspeaker_or_searchlight_optional"]
role_note = "Fast wide-area observation and first-pass screening; weaker close-contact confirmation than USV."

[platform.usv]
model_hint = "Domestic small electric inspection USV class, 5-7 m harbor patrol boat"
speed_mps = 4.0
endurance_minutes = 240.0
payload_kg = 30.0
coverage_width_cells = 1
energy_rate_per_cell = 0.7
allowed_task_types = ["point"]
preferred_task_types = ["point"]
sensor_payloads = ["visible_camera", "water_quality_sensor", "side_scan_or_forward_sonar_optional"]
role_note = "Slow close-range water-surface confirmation and persistent patrol; constrained to navigable water."

[scheduling]
risk_weight = 14.0
distance_weight = 0.07
load_weight = 0.28
compatibility_bonus = 5.0

[scheduler_rl]
max_steps = 64
candidate_k = 8
learning_rate = 0.0003
gamma = 0.98
gae_lambda = 0.95
clip_ratio = 0.2
update_epochs = 4
rollout_steps = 32
hidden_dim = 128

[scheduler_rl.reward]
team_close_reward = 8.0
screen_progress_reward = 1.0
review_progress_reward = 1.5
energy_cost = 0.5
time_cost = 0.01
invalid_penalty = 5.0
conflict_penalty = 1.0

[review_trigger]
confidence_threshold = 0.65
mandatory_review_risk = 3
base_review_deadline = 36.0
risk_deadline_scale = 4.0
confidence_deadline_scale = 3.0
sensitivity = 0.85
specificity = 0.80
confidence_noise = 0.08
uncertainty_base = 0.35

[review_trigger.anomaly_probability_by_risk]
1 = 0.10
2 = 0.25
3 = 0.45
